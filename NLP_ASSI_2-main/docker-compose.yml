services:
  app:
    build: .
    container_name: smilecare-chatbot
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: smilecare-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
